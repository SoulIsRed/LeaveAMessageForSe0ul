<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Message for se0ul</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  transition: background 0.8s ease;
}

.overlay {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.overlay-content {
  font-size: 16px;
  opacity: 0.8;
}

.box {
  width: 100%;
  max-width: 420px;
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(10px);
  padding: 22px;
  border-radius: 14px;
}

textarea, input {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #0f0f0f;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 11px;
  border: none;
  border-radius: 10px;
  background: white;
  color: black;
  font-weight: bold;
}

.music-bar {
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(30,30,30,0.7);
  padding: 10px;
  border-radius: 12px;
}

.cover {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.track-info { flex: 1; }

.controls { display: flex; gap: 6px; }

.progress-container {
  height: 4px;
  background: rgba(255,255,255,0.2);
  margin-top: 6px;
  border-radius: 10px;
  cursor: pointer;
}

.progress {
  height: 4px;
  width: 0%;
  background: white;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  padding: 10px 14px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}
.toast.show { opacity: 1; }

</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="startExperience()">
  <div class="overlay-content">Tap to enter</div>
</div>

<div class="box">

<h2>Leave a Message for se0ul</h2>

<p class="intro">
Hey!! it’s me Jared / se0ul. I’m leaving the Philippines to go to America.
Leave a message for me here :)
</p>

<textarea id="msg" placeholder="Write something..."></textarea>
<input id="name" placeholder="Name (optional)">
<button onclick="send()">Send</button>

<!-- PLAYER -->
<div class="music-bar">

  <div class="cover" onclick="openArtist()">
    <img id="cover">
  </div>

  <div class="track-info">
    <div id="title">Song</div>

    <div class="progress-container" onclick="seek(event)">
      <div class="progress" id="prog"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()" id="btn">▶</button>
    <button onclick="next()">⏭</button>
  </div>

</div>

<audio id="audio"></audio>

</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =========================
   START EXPERIENCE (FIXED)
========================= */
window.startExperience = function () {
  const overlay = document.getElementById("overlay");

  overlay.style.opacity = "0";
  overlay.style.pointerEvents = "none";

  setTimeout(() => {
    overlay.style.display = "none";
    load(0, true);
  }, 200);
};
  
/* =========================
   SONGS
========================= */
const songs = [
  {
    name: "Home",
    src: "songs/song1.mp3",
    cover: "covers/cover1.jpg",
    artist: "https://open.spotify.com",
    theme: "#f8edad"
  },
  {
    name: "what can i do?",
    src: "songs/song2.mp3",
    cover: "covers/cover2.jpg",
    artist: "https://open.spotify.com",
    theme: "#4e533f"
  },
  {
    name: "Coffee",
    src: "songs/song3.mp3",
    cover: "covers/cover3.jpg",
    artist: "https://open.spotify.com",
    theme: "#93461c"
  }
];

let i = 0;
let sent = sessionStorage.getItem("sent") === "true";

let supabase = null;
let audio;

/* =========================
   SAFE INIT (IMPORTANT)
========================= */
window.addEventListener("DOMContentLoaded", () => {

  audio = document.getElementById("audio");

  /* SUPABASE INIT */
  try {
    supabase = window.supabase?.createClient(
      "https://kbbapvcsftcrdvvobbju.supabase.co",
      "sb_publishable_0wWs2IDtWSuAIIGwKyA3dw_Mn8zeubq"
    );
  } catch (e) {
    console.log("Supabase error", e);
  }

  audio.addEventListener("ended", next);

  load(0, false);
});


/* =========================
   MUSIC
========================= */
function load(x, play=true){
  i = x;
  let s = songs[i];

  audio.src = s.src;
  document.getElementById("title").innerText = s.name;
  document.getElementById("cover").src = s.cover;
  document.body.style.background = s.theme;

  if(play){
    audio.play().catch(()=>{});
    document.getElementById("btn").innerText = "⏸";
  }
}

function toggle(){
  if(audio.paused){
    audio.play();
    document.getElementById("btn").innerText = "⏸";
  } else {
    audio.pause();
    document.getElementById("btn").innerText = "▶";
  }
}

function next(){ load((i+1)%songs.length); }
function prev(){ load((i-1+songs.length)%songs.length); }

function seek(e){
  let x = e.offsetX / e.target.clientWidth;
  audio.currentTime = x * audio.duration;
}

function openArtist(){
  window.open(songs[i].artist, "_blank");
}

/* =========================
   TOAST
========================= */
function toast(t){
  let el = document.getElementById("toast");
  el.innerText = t;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2000);
}

/* =========================
   SEND MESSAGE
========================= */
async function send(){
  if(sent) return toast("Already sent");

  let m = document.getElementById("msg").value;
  let n = document.getElementById("name").value;

  if(!m.trim()) return toast("Write something");
  if(!supabase) return toast("Loading...");

  const { error } = await supabase.from("messages").insert([
    {
      to: "se0ul",
      message: m,
      name: n || "Anonymous"
    }
  ]);

  if(error){
    console.log(error);
    return toast("Error sending");
  }

  sent = true;
  sessionStorage.setItem("sent","true");

  toast("Message sent");

  document.getElementById("msg").value="";
  document.getElementById("name").value="";
}

</script>

</body>
</html>
